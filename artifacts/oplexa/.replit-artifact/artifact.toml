kind = "mobile"
previewPath = "/oplexa/"
title = "Oplexa - AI Assistant"
version = "1.0.0"
id = "artifacts/oplexa"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/oplexa/" ]
localPort = 20269

[services.development]
run = "pnpm --filter @workspace/oplexa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oplexa", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/oplexa", "run", "serve" ]

[services.env]
PORT = "20269"
BASE_PATH = "/oplexa/"
