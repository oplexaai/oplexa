kind = "web"
previewPath = "/"
title = "Dr. Nisha - Medical Chatbot"
version = "1.0.0"
id = "artifacts/dr-nisha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20128

[services.development]
run = "pnpm --filter @workspace/dr-nisha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dr-nisha", "run", "build" ]
publicDir = "artifacts/dr-nisha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20128"
BASE_PATH = "/"
